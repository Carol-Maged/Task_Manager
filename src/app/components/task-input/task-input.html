
<div class="container mt-5">

  <h3 class="fw-bold">Add a new task</h3>
  <p class="text-muted mb-4">Fill in the details below to create a task.</p>

  <div class="card p-4 shadow-sm task-card">

    <form (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label fw-semibold">Task title *</label>
        <input
          type="text"
          class="form-control"
          placeholder="e.g. Finish Angular assignment..."
          [(ngModel)]="title"
          name="title"
        >
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Description</label>
        <textarea
          class="form-control"
          rows="4"
          placeholder="Add more details about this task..."
          [(ngModel)]="description"
          name="description"
        ></textarea>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Due date</label>
          <input
            type="date"
            class="form-control"
            [(ngModel)]="date"
            name="date"
          >
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Category</label>
          <select
            class="form-control"
            [(ngModel)]="category"
            name="category"
          >
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold d-block">Priority *</label>

        <div class="d-flex gap-2">
          <button
            type="button"
            class="btn btn-outline-danger"
            [class.active]="priority === 'High'"
            (click)="priority = 'High'"
          >
            High
          </button>

          <button
            type="button"
            class="btn btn-outline-warning"
            [class.active]="priority === 'Medium'"
            (click)="priority = 'Medium'"
          >
            Medium
          </button>

          <button
            type="button"
            class="btn btn-outline-success"
            [class.active]="priority === 'Low'"
            (click)="priority = 'Low'"
          >
            Low
          </button>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="button" class="btn btn-light">Cancel</button>
        <button type="submit" class="btn btn-primary">
          {{ isEditMode ? 'Update Task' : 'Add Task' }}
        </button>
      </div>

    </form>
  </div>
</div>
