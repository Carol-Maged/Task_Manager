
<div class="card shadow-sm p-3 task-card">

  <!-- Top -->
  <div class="d-flex justify-content-between align-items-start">

    <div>
      <h5 class="mb-1">{{ task.title }}</h5>

      <p class="text-muted mb-2">
        {{ task.description }}
      </p>
    </div>

    <span
      class="badge"
      [ngClass]="{
        'bg-success': task.status === 'Done',
        'bg-primary': task.status === 'InProgress'
      }"
    >
      {{ task.status }}
    </span>

  </div>

  <!-- Bottom -->
  <div class="d-flex justify-content-between align-items-center mt-3">

    <div>

      <span
        class="badge me-2"
        [ngClass]="{
          'bg-danger': task.priority === 'High',
          'bg-warning': task.priority === 'Medium',
          'bg-primary': task.priority === 'Low'
        }"
      >
        {{ task.priority }}
      </span>

      <small class="text-muted">
        {{ task.date | date:'MMM d, yyyy' }}
      </small>

    </div>

    <!-- Buttons -->
    <div class="d-flex gap-2">

      <button class="btn btn-success btn-sm" (click)="onDone()">
        Done
      </button>

      <button class="btn btn-primary btn-sm" (click)="onUpdate()">
        Update
      </button>

      <button class="btn btn-danger btn-sm" (click)="onDelete()">
        Delete
      </button>

    </div>

  </div>

</div>
